<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI Mini 4 Pro Flight Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@0.4.14/dist/leaflet.draw.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 350px; padding: 20px; background: #f8f9fa; border-right: 1px solid #ddd; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 1000; }
        #right-panel { width: 300px; padding: 20px; background: #f8f9fa; border-left: 1px solid #ddd; overflow-y: auto; box-shadow: -2px 0 5px rgba(0,0,0,0.1); z-index: 1000; }
        #map { flex-grow: 1; height: 100%; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        .stats { margin-top: 20px; padding: 10px; background: #e9ecef; border-radius: 4px; font-size: 0.85em; }
        #search-container { position: absolute; top: 10px; left: 370px; z-index: 1000; background: white; padding: 5px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: flex; }
        #search-input { width: 250px; border: none; padding: 5px; outline: none; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Flight Planner</h2>
        <div class="control-group">
            <label>Flying Height (m)</label>
            <input type="number" id="height" value="50" step="1">
        </div>
        <div class="control-group">
            <label>Front Overlap (%)</label>
            <input type="number" id="frontOverlap" value="80" step="1">
        </div>
        <div class="control-group">
            <label>Side Overlap (%)</label>
            <input type="number" id="sideOverlap" value="70" step="1">
        </div>
        <div class="control-group">
            <label>Flight Speed (m/s)</label>
            <input type="number" id="speed" value="5" step="0.1">
        </div>
        <div class="control-group">
            <label>Flight Direction (° North)</label>
            <input type="number" id="direction" value="0" min="0" max="359">
        </div>
        <div class="control-group">
            <label>Camera Angle (° Nadir= -90)</label>
            <input type="number" id="cameraAngle" value="-90" min="-90" max="0">
        </div>
        <div class="control-group">
            <label>Focal Length (mm real)</label>
            <select id="focalLength">
                <option value="6.78">Standard (6.78 mm)</option>
                <option value="4.8">Wide Angle (4.8 mm)</option>
            </select>
        </div>
        <div class="control-group">
            <label>Trigger Mode</label>
            <select id="triggerMode">
                <option value="optimized">Optimized (Manual Timed Shot)</option>
                <option value="precise">Precise (Waypoint per Photo)</option>
            </select>
        </div>
        <div id="precise-settings" style="display: none; border: 1px solid #ddd; padding: 10px; border-radius: 4px; background: #fff; margin-bottom: 15px;">
            <h4 style="margin-top: 0;">Camera Settings (Precise Only)</h4>
            <div class="control-group">
                <label>Image Format</label>
                <select id="imageFormat">
                    <option value="JPEG">JPEG</option>
                    <option value="DNG">DNG (RAW)</option>
                    <option value="JPEG_DNG">JPEG + DNG</option>
                </select>
            </div>
            <div class="control-group">
                <label>White Balance</label>
                <select id="whiteBalance">
                    <option value="AUTO">Auto</option>
                    <option value="SUNNY">Sunny</option>
                    <option value="CLOUDY">Cloudy</option>
                    <option value="CUSTOM">Custom (Kelvin)</option>
                </select>
            </div>
            <div class="control-group">
                <label>ISO</label>
                <select id="iso">
                    <option value="AUTO">Auto</option>
                    <option value="100">100</option>
                    <option value="200">200</option>
                    <option value="400">400</option>
                    <option value="800">800</option>
                </select>
            </div>
            <div class="control-group">
                <label>Shutter Speed</label>
                <select id="shutterSpeed">
                    <option value="AUTO">Auto</option>
                    <option value="1/500">1/500</option>
                    <option value="1/1000">1/1000</option>
                    <option value="1/2000">1/2000</option>
                    <option value="1/4000">1/4000</option>
                </select>
            </div>
            <div class="control-group">
                <label>Focus Mode (Tiefenschärfe)</label>
                <select id="focusMode">
                    <option value="AUTO">Auto Focus (AF)</option>
                    <option value="INFINITY">Infinity (∞ / Berg-Symbol)</option>
                    <option value="NEAR">Near (Nahbereich)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Gimbal Pitch Override (°)</label>
                <input type="number" id="gimbalOverride" value="-90" min="-90" max="0">
            </div>
        </div>
        <div class="control-group">
            <label>
                <input type="checkbox" id="terrainFollow" checked> Terrain Follow (AMSL)
            </label>
        </div>
        <button id="generateBtn">Generate Flight Plan</button>
        <button id="exportBtn" class="secondary" disabled>Export KMZ</button>
        <div class="control-group" style="margin-top: 10px;">
            <label>Import DJI KMZ</label>
            <input type="file" id="importFile" accept=".kmz" style="font-size: 0.8em;">
        </div>
        
        <div class="stats" id="stats">
            Waypoints: 0 / 200<br>
            Estimated Photos: 0<br>
            Interval: - s
        </div>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search location...">
        <button id="search-btn" style="width: auto; margin: 0; padding: 5px 10px;">Go</button>
    </div>
    <div id="map"></div>

    <div id="right-panel">
        <h2>Waypoint Details</h2>
        <div id="waypoint-info">
            Select a waypoint on the map to see its actions.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@0.4.14/dist/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
